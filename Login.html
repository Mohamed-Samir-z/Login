<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="https://assets.streamlinehq.com/image/private/w_300,h_300,ar_1/f_auto/v1/icons/ui-actions/login-ea083uwet2vpu5dyewv19k.png/login-7jy93lp4yahwdnjciib2.png?_a=DATAiZAAZAA0"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./CSS/Login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <title>Login Page</title>
  </head>
  <body>
    <div class="container">
      <form>
        <h1>Login</h1>
        <div>
          <input type="email" id="email" placeholder="." name="Email" required />
          <label for="email">Email</label>
          <i class="fa-regular fa-envelope"></i>
        </div>

        <div>
          <input type="password" id="password" placeholder="." name="password" required />
          <label for="password">Password</label>
          <i class="fa-solid fa-lock"></i>
        </div>

        <div class="remember">
          <label for="checkbox-remember">
            <input type="checkbox" name="remember" id="checkbox-remember" />
            Remember me</label
          >
          <a href="#">Forget Password?</a>
        </div>
        <button type="submit">Login</button>
        <p>Don't have an account? <a href="#">Sign up</a></p>
      </form>
    </div>
  </body>
</html>
